<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-powered lap analysis for iRacing drivers" />
    <title>Telemetry Analyst</title>
    <script>
      (function () {
        var stored = localStorage.getItem('theme')
        if (stored === 'light') {
          document.documentElement.classList.remove('dark')
          document.write('<style>body{background-color:#f8fafc}</style>')
        } else {
          document.documentElement.classList.add('dark')
          document.write('<style>body{background-color:#0f172a}</style>')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
