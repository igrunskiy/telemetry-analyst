services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-telemetry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telemetry_secret}
      POSTGRES_DB: ${POSTGRES_DB:-telemetry_analyst}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telemetry} -d ${POSTGRES_DB:-telemetry_analyst}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/${IMAGE_OWNER:-igrunskiy}/${IMAGE_REPO:-telemetry-analyst}-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/${IMAGE_OWNER:-igrunskiy}/${IMAGE_REPO:-telemetry-analyst}-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend

  proxy:
    image: ghcr.io/${IMAGE_OWNER:-igrunskiy}/${IMAGE_REPO:-telemetry-analyst}-proxy:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
