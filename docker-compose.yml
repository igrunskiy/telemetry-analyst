services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-telemetry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telemetry_secret}
      POSTGRES_DB: ${POSTGRES_DB:-telemetry_analyst}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telemetry} -d ${POSTGRES_DB:-telemetry_analyst}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    command: ["python", "-Xfrozen_modules=off", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    environment:
      GARAGE61_CLIENT_ID:
      GARAGE61_CLIENT_SECRET:
      GARAGE61_REDIRECT_URI:
      GARAGE61_PERSONAL_TOKEN:
      CLAUDE_API_KEY:
      GEMINI_API_KEY:
      SECRET_KEY:
      ENCRYPTION_KEY:
      LOG_LEVEL:
      POSTGRES_USER:
      POSTGRES_PASSWORD:
      POSTGRES_DB:
      DATABASE_URL:
      CORS_ORIGINS:
      DOMAIN:
      DISCORD_CLIENT_ID:
      DISCORD_CLIENT_SECRET:
      DISCORD_REDIRECT_URI:
      ANALYSIS_WORKER_POOL_SIZE:
      ANALYSIS_WORKER_TIMEOUT:
      CLAUDE_MAX_TOKENS:
      GEMINI_MAX_TOKENS:
      ENABLE_REMOTE_DEBUG: ${ENABLE_REMOTE_DEBUG:-false}
      REMOTE_DEBUG_PORT: ${REMOTE_DEBUG_PORT:-5678}
      REMOTE_DEBUG_WAIT: ${REMOTE_DEBUG_WAIT:-false}
      PYDEVD_DISABLE_FILE_VALIDATION: "1"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./.env:/app/.env
    ports:
      - "8000:8000"
      - "5678:5678"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
